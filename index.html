<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MuGöl Gülmece ⭐</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2FB6CC">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MuGöl Gülmece">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<script src="espriler.js"></script>
<script src="bilmeceler.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600;1,700&display=swap');

  :root{
    /* MuGöl Gülmece — oyuncaklı kış paleti */
    --navy-1:#2FB6CC;
    --navy-2:#243B53;
    --navy-3:#7FE0EE;
    --navy-4:#1D8FA3;
    --navy-ink:#243B53;
    --navy-soft:#5C7086;

    --yellow-1:#FFDE7A;
    --yellow-2:#FFC94A;
    --yellow-3:#F0A500;
    --yellow-glow:#FFF3D1;

    --coral:#FF8B67;
    --coral-deep:#F2663F;

    --panel:#FFF9EF;
    --panel-2:#FFE9D6;
    --card-paper:#FFFFFF;

    --ink:#243B53;
    --ink-soft:#5C7086;

    --accent-red:#EF5F6B;

    --shadow-navy: 0 20px 34px rgba(36,59,83,0.18);
    --shadow-soft: 0 6px 0 #E7D8BE, 0 14px 26px rgba(36,59,83,0.12);
    --shadow-yellow: 0 6px 0 var(--yellow-3), 0 14px 26px rgba(240,165,0,0.30);
    --shadow-navy-btn: 0 6px 0 var(--navy-4), 0 14px 26px rgba(47,182,204,0.30);
    --shadow-coral-btn: 0 6px 0 var(--coral-deep), 0 14px 26px rgba(242,102,63,0.30);
    --radius-lg:26px;
    --radius-md:20px;
    --radius-blob: 38% 62% 61% 39% / 42% 40% 60% 58%;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito', sans-serif;
    min-height:100vh;
    background:
      radial-gradient(900px 500px at 15% -80px, rgba(127,224,238,0.35), transparent 60%),
      radial-gradient(700px 460px at 100% 0%, rgba(255,201,74,0.28), transparent 55%),
      linear-gradient(180deg, #FFFBF3 0%, #FFF3E2 55%, #FFEAD3 100%);
    color:var(--ink);
    overflow-x:hidden;
    position:relative;
  }

  body::before{
    content:"";
    position:fixed; inset:0;
    background-image: radial-gradient(circle, rgba(36,59,83,0.05) 1.4px, transparent 1.8px);
    background-size:22px 22px;
    opacity:0.6;
    pointer-events:none;
    z-index:0;
  }

  .app{
    max-width:480px;
    margin:0 auto;
    position:relative;
    z-index:1;
    padding-bottom:16px;
  }

  /* ---------- HEADER ---------- */
  header{
    background: linear-gradient(155deg, #FFFFFF 0%, #FFF7E8 100%);
    padding:14px 20px 20px;
    border-radius:0 0 28px 28px;
    box-shadow:0 10px 0 #F0DDBB, 0 18px 30px rgba(36,59,83,0.10);
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute; right:-50px; top:-60px;
    width:200px; height:200px; border-radius:50%;
    background:radial-gradient(circle, rgba(47,182,204,0.20), transparent 70%);
    pointer-events:none;
  }
  header::before{
    content:"";
    position:absolute; left:-10px; bottom:-70px;
    width:150px; height:150px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,201,74,0.28), transparent 70%);
    pointer-events:none;
  }
  .header-top{
    display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    position:relative; z-index:1;
  }
  .brand{ display:flex; align-items:center; gap:13px; }
  .magnet-icon{
    width:54px; height:54px;
    border-radius:var(--radius-blob);
    background:linear-gradient(145deg, var(--navy-3), var(--navy-1));
    display:flex; align-items:center; justify-content:center;
    font-size:1.6rem;
    box-shadow:0 6px 0 var(--navy-4), 0 12px 20px rgba(47,182,204,0.35);
    flex-shrink:0;
    transform:rotate(-8deg);
    animation:wobble 5s ease-in-out infinite;
    overflow:hidden;
    padding:9px;
  }
  .magnet-icon img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
  }
  @keyframes wobble{
    0%,100%{ transform:rotate(-8deg); }
    50%{ transform:rotate(4deg); }
  }
  h1{
    font-family:'Nunito', sans-serif;
    font-weight:800;
    font-size:1.4rem;
    color:var(--ink);
    margin:0;
    letter-spacing:0.2px;
    line-height:1.1;
  }
  header p.tag{
    color:var(--ink-soft);
    margin:6px 0 0;
    font-size:0.83rem;
    font-weight:600;
    opacity:0.9;
  }
  .fav-pill{
    display:flex; align-items:center; gap:7px;
    background:linear-gradient(145deg, var(--yellow-1), var(--yellow-2));
    border:none;
    color:var(--navy-2);
    padding:10px 15px;
    border-radius:18px;
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:0.9rem;
    cursor:pointer;
    flex-shrink:0;
    transition:transform 0.15s ease;
    box-shadow:var(--shadow-yellow);
  }
  .fav-pill:active{ transform:translateY(4px); box-shadow:0 2px 0 var(--yellow-3), 0 4px 10px rgba(240,165,0,0.25); }
  .fav-pill span.count{
    background:var(--navy-2);
    color:#fff;
    border-radius:9px;
    padding:2px 8px;
    font-size:0.78rem;
    min-width:18px;
    text-align:center;
    font-weight:800;
  }

  /* ---------- VIEW SWITCH ---------- */
  .view{display:none; padding:14px 18px;}
  .view.active{display:block; animation:fadeIn 0.4s cubic-bezier(.2,.8,.3,1);}
  @keyframes fadeIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

  /* ---------- MENU ---------- */
  .menu-grid{display:flex; flex-direction:column; gap:15px; margin-top:6px;}

  .card{
    display:flex;
    align-items:center;
    gap:16px;
    padding:16px 18px;
    border-radius:var(--radius-md);
    box-shadow:var(--shadow-soft);
    cursor:pointer;
    border:3px solid #fff;
    text-align:left;
    color:var(--ink);
    position:relative;
    background:var(--card-paper);
    transition:transform 0.16s cubic-bezier(.3,1.4,.5,1), box-shadow 0.16s ease;
    -webkit-user-select:none; user-select:none;
  }
  .card:active{
    transform:translateY(5px) scale(0.99);
    box-shadow:0 1px 0 #E7D8BE, 0 4px 10px rgba(36,59,83,0.10);
  }
  .card .icon-badge{
    width:54px; height:54px;
    border-radius:var(--radius-blob);
    display:flex; align-items:center; justify-content:center;
    font-size:1.6rem;
    flex-shrink:0;
    color:#fff;
    box-shadow:inset 0 -4px 6px rgba(0,0,0,0.10), inset 0 3px 4px rgba(255,255,255,0.4);
  }
  .card .icon-badge svg{
    width:26px; height:26px;
  }
  .card .card-text{flex:1; min-width:0;}
  .card .card-title{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:1.08rem;
    margin:0 0 3px;
    letter-spacing:0.2px;
    color:var(--ink);
  }
  .card .card-sub{
    margin:0;
    font-size:0.8rem;
    color:var(--ink-soft);
    font-weight:600;
  }
  .card .chevron{
    font-size:1.3rem; flex-shrink:0; color:var(--navy-1);
    width:32px; height:32px; border-radius:50%;
    background:var(--panel-2);
    display:flex; align-items:center; justify-content:center;
  }

  .card.espriler .icon-badge{background:linear-gradient(145deg, var(--yellow-1), var(--yellow-3)); transform:rotate(-4deg);}
  .card.bilmece .icon-badge{background:linear-gradient(145deg, var(--navy-3), var(--navy-1)); transform:rotate(4deg);}
  .card.favoriler .icon-badge{background:linear-gradient(145deg, #FFB199, var(--coral-deep)); transform:rotate(-4deg);}
  .card.yukle .icon-badge{background:linear-gradient(145deg, var(--navy-3), var(--navy-1)); transform:rotate(-4deg);}
  .card.cikis .icon-badge{background:linear-gradient(145deg, #E9AFC0, var(--accent-red)); transform:rotate(4deg);}

  /* ---------- ESPRİ VIEWER ---------- */
  .back-btn{
    background:#fff;
    border:3px solid var(--panel-2);
    color:var(--ink);
    padding:11px 18px;
    border-radius:18px;
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:0.95rem;
    display:flex; align-items:center; gap:9px;
    cursor:pointer;
    width:100%;
    box-shadow:0 4px 0 #EFE1CA;
    transition:transform 0.12s ease;
  }
  .back-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #EFE1CA; }
  .back-btn .arrow{font-size:1.1rem; color:var(--coral-deep);}

  .viewer-controls{
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin:14px 4px 12px;
    flex-wrap:wrap;
  }
  .fav-star-btn{
    background:#fff;
    border:3px solid var(--panel-2);
    color:var(--navy-2);
    width:50px; height:50px;
    border-radius:16px;
    font-size:1.4rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow:0 4px 0 #EFE1CA;
    transition:transform 0.15s ease, color 0.15s ease;
  }
  .fav-star-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #EFE1CA; }
  .fav-star-btn.active{
    background:linear-gradient(145deg, var(--yellow-1), var(--yellow-2));
    color:var(--coral-deep);
    border-color:var(--yellow-3);
  }
  .fav-star-btn.download-btn{
    background:linear-gradient(145deg, var(--navy-3), var(--navy-1));
    color:#fff;
    border:3px solid var(--navy-1);
    box-shadow:var(--shadow-navy-btn);
    font-size:1.15rem;
  }
  .fav-star-btn.download-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--navy-4); }
  .shuffle-btn{
    background:linear-gradient(145deg, var(--yellow-1), var(--yellow-2));
    border:none;
    cursor:pointer;
    color:var(--navy-2);
    font-size:1.3rem;
    width:50px; height:50px;
    border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:var(--shadow-yellow);
  }
  .counter{
    min-width:60px; height:50px;
    padding:0 16px;
    border-radius:16px;
    background:linear-gradient(145deg, var(--navy-3), var(--navy-1));
    display:flex; align-items:center; justify-content:center;
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:0.98rem;
    color:#fff;
    box-shadow:var(--shadow-navy-btn);
    letter-spacing:0.5px;
  }

  /* ---------- JOKE CARD ---------- */
  .joke-stage{
    min-height:190px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2px 2px 0;
    perspective:1200px;
    position:relative;
  }
  .joke-stage::before{
    content:"";
    position:absolute; inset:10px -6px;
    background:radial-gradient(ellipse at 50% 40%, rgba(255,201,74,0.30), transparent 65%);
    filter:blur(24px);
    z-index:0;
    pointer-events:none;
  }

  .joke-card{
    background:var(--card-paper);
    border-radius:30px;
    padding:38px 22px 30px;
    box-shadow:
      0 10px 0 var(--panel-2),
      0 22px 40px rgba(36,59,83,0.18);
    text-align:center;
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:1.2rem;
    line-height:1.45;
    color:var(--ink);
    width:100%;
    min-height:180px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    border:4px solid #fff;
    outline:2px dashed rgba(47,182,204,0.18);
    outline-offset:-13px;
    z-index:1;
    overflow:hidden;
  }
  /* Kart üstündeki rozet (sadece espri kartında) */
  .joke-card.esp-card::before{
    content:"SOĞUK ESPRİ";
    position:absolute;
    top:-2px; left:50%;
    transform:translateX(-50%);
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:0.66rem;
    letter-spacing:2px;
    color:var(--navy-2);
    background:linear-gradient(145deg, var(--yellow-1), var(--yellow-2));
    padding:7px 18px 8px;
    border-radius:0 0 16px 16px;
    box-shadow:0 4px 10px rgba(240,165,0,0.30);
  }
  .joke-card::after{
    content:"❄ ❄ ❄";
    position:absolute; left:0; right:0; bottom:14px;
    text-align:center;
    font-size:0.72rem;
    letter-spacing:6px;
    color:var(--navy-1);
    opacity:0.6;
  }
  .joke-card .corner{
    position:absolute;
    width:26px; height:26px;
    color:var(--coral);
    opacity:0.85;
    font-size:1.2rem;
    display:flex; align-items:center; justify-content:center;
  }
  .joke-card .corner.tl{top:46px; left:16px; transform:rotate(-15deg); color:var(--yellow-3);}
  .joke-card .corner.tr{top:46px; right:16px; transform:rotate(15deg); color:var(--yellow-3);}
  .joke-card .corner.bl{bottom:38px; left:16px; transform:rotate(-15deg); opacity:0.5; color:var(--navy-1);}
  .joke-card .corner.br{bottom:38px; right:16px; transform:rotate(15deg); opacity:0.5; color:var(--navy-1);}

  .joke-card .joke-text{
    position:relative;
    z-index:2;
    padding:10px 4px 0;
    width:100%;
    max-width:100%;
  }
  .joke-card .joke-text::before{
    content:"“";
    display:block;
    font-family:'Nunito', sans-serif;
    font-size:2.3rem;
    line-height:0.4;
    color:var(--coral);
    margin-bottom:10px;
    opacity:0.85;
  }

  .joke-card.flip{animation:flipCard 0.5s ease;}
  @keyframes flipCard{
    0%{transform:rotateY(0deg) scale(1); opacity:1;}
    45%{transform:rotateY(90deg) scale(0.92); opacity:0.1;}
    55%{transform:rotateY(-90deg) scale(0.92); opacity:0.1;}
    100%{transform:rotateY(0deg) scale(1); opacity:1;}
  }

  .fav-row{
    display:flex; justify-content:center; margin-top:20px;
  }
  .fav-btn{
    background:#fff;
    border:3px solid var(--panel-2);
    color:var(--navy-2);
    border-radius:18px;
    padding:12px 24px;
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:0.92rem;
    display:flex; align-items:center; gap:8px;
    cursor:pointer;
    box-shadow:0 4px 0 #EFE1CA;
    transition:transform 0.15s ease;
  }
  .fav-btn:active{ transform:translateY(3px); }
  .fav-btn.active{
    background:linear-gradient(145deg, var(--yellow-1), var(--yellow-2));
    color:var(--navy-2);
    border-color:var(--yellow-3);
  }

  .nav-row{
    display:flex; align-items:center; gap:16px;
    margin-top:14px;
  }
  .nav-circle{
    width:52px; height:52px;
    border-radius:18px;
    border:none;
    background:#fff;
    border:3px solid var(--panel-2);
    display:flex; align-items:center; justify-content:center;
    font-size:1.3rem;
    color:var(--navy-2);
    cursor:pointer;
    flex-shrink:0;
    box-shadow:0 4px 0 #EFE1CA;
    transition:transform 0.12s ease;
    font-weight:800;
  }
  .nav-circle:active{ transform:translateY(3px); box-shadow:0 1px 0 #EFE1CA; }
  .nav-circle-wide{
    flex:1;
    height:56px;
    font-size:1.5rem;
    background:linear-gradient(145deg, var(--navy-3), var(--navy-1));
    color:#fff;
    border:none;
    box-shadow:var(--shadow-navy-btn);
  }
  .nav-circle-wide:active{ transform:translateY(5px); box-shadow:0 1px 0 var(--navy-4); }
  .share-btn{
    flex:1;
    background:linear-gradient(145deg, var(--coral), var(--coral-deep));
    color:#fff;
    border:none;
    border-radius:18px;
    padding:15px;
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:1rem;
    display:flex; align-items:center; justify-content:center; gap:9px;
    cursor:pointer;
    box-shadow:var(--shadow-coral-btn);
    letter-spacing:0.3px;
    transition:transform 0.15s ease;
  }
  .share-btn:active{ transform:translateY(5px); box-shadow:0 1px 0 var(--coral-deep); }

  /* ---------- LIST VIEWS ---------- */
  .list-item{
    background:#fff;
    border-radius:var(--radius-md);
    padding:18px 19px;
    margin-bottom:12px;
    box-shadow:0 5px 0 var(--panel-2), 0 10px 18px rgba(36,59,83,0.08);
    border:3px solid var(--panel-2);
  }
  .list-item .q{font-weight:700; font-family:'Nunito',sans-serif; margin-bottom:8px; font-size:0.99rem; color:var(--ink);}
  .list-item .a{color:var(--navy-4); font-weight:700; display:none; font-size:0.93rem;}
  .list-item.revealed .a{display:block;}
  .list-item .reveal-btn{
    margin-top:9px;
    background:linear-gradient(145deg, var(--yellow-1), var(--yellow-2));
    border:none; border-radius:14px;
    padding:9px 15px;
    font-family:'Nunito', sans-serif;
    font-weight:700; font-size:0.83rem;
    color:var(--navy-2);
    cursor:pointer;
    box-shadow:0 3px 0 var(--yellow-3);
  }
  .list-item.fav-item{border-color:var(--yellow-2);}
  .list-item .meta{
    display:flex; align-items:center; justify-content:space-between; gap:14px; margin-top:10px; font-size:0.8rem; color:var(--ink-soft); font-weight:700;
  }
  .remove-fav{
    background:#FFEBEC;
    border:none;
    color:var(--accent-red);
    border-radius:12px;
    padding:7px 13px;
    font-weight:700;
    font-size:0.78rem;
    cursor:pointer;
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
  }
  .empty-state .emoji{font-size:2.8rem; display:block; margin-bottom:12px;}
  .empty-state p{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:1.05rem;
    margin:0;
    color:var(--ink);
  }
  .empty-state span.hint{
    display:block;
    font-family:'Nunito', sans-serif;
    font-weight:500;
    font-size:0.85rem;
    margin-top:7px;
    color:var(--ink-soft);
  }

  .section-title{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:1.02rem;
    color:var(--ink);
    margin:4px 4px 15px;
  }

  /* ---------- TÜMÜ BUTONU ---------- */
  .all-btn{
    display:flex; align-items:center; justify-content:center; gap:7px;
    background:#fff;
    border:3px solid var(--panel-2);
    color:var(--navy-2);
    height:50px;
    padding:0 18px;
    border-radius:16px;
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:0.9rem;
    cursor:pointer;
    box-shadow:0 4px 0 #EFE1CA;
    transition:transform 0.12s ease;
  }
  .all-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #EFE1CA; }

  /* ---------- TÜM LİSTE (2'li küçük kart ızgarası) ---------- */
  .grid-view .back-btn{ margin-bottom:16px; }
  .mini-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:11px;
    margin-top:6px;
  }
  .mini-card{
    background:var(--card-paper);
    border-radius:16px;
    padding:13px 12px 12px;
    border:3px solid #fff;
    box-shadow:0 5px 0 var(--panel-2), 0 9px 16px rgba(36,59,83,0.10);
    cursor:pointer;
    text-align:left;
    position:relative;
    min-height:104px;
    display:flex;
    flex-direction:column;
    transition:transform 0.14s cubic-bezier(.3,1.4,.5,1), box-shadow 0.14s ease;
    -webkit-user-select:none; user-select:none;
  }
  .mini-card:active{
    transform:translateY(4px) scale(0.98);
    box-shadow:0 1px 0 var(--panel-2), 0 3px 8px rgba(36,59,83,0.10);
  }
  .mini-card .mini-num{
    font-family:'Nunito', sans-serif;
    font-weight:800;
    font-size:0.68rem;
    color:#fff;
    background:linear-gradient(145deg, var(--navy-3), var(--navy-1));
    border-radius:8px;
    padding:2px 7px;
    display:inline-block;
    align-self:flex-start;
    margin-bottom:7px;
    letter-spacing:0.3px;
  }
  .mini-card.bilmece-mini .mini-num{
    background:linear-gradient(145deg, var(--yellow-1), var(--yellow-3));
    color:var(--navy-2);
  }
  .mini-card .mini-text{
    font-family:'Nunito', sans-serif;

<script>
/* ============ DATA ============ */
/* jokes -> espriler.js, bilmeceler -> bilmeceler.js dosyalarından yükleniyor */

/* ============ STATE ============ */
let currentIndex = 0;
let favorites = new Set();
let order = jokes.map((_, i) => i);

/* ============ NAVIGATION ============ */
function openView(id){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}
function openEspriler(){ openView('view-espriler'); renderJoke(); }
function openFavoriler(){ openView('view-favoriler'); renderFavoriler(); }

/* ============ ESPRİ VIEWER ============ */
function renderJoke(){
  const txt = document.getElementById('joke-text');
  const idx = order[currentIndex];
  txt.textContent = jokes[idx].t;
  document.getElementById('joke-counter').textContent = (currentIndex + 1) + ' / ' + order.length;
  updateFavBtn();
}

function flipTo(newIndex){
  const card = document.getElementById('joke-card');
  card.classList.remove('flip');
  void card.offsetWidth;
  card.classList.add('flip');
  currentIndex = newIndex;
  setTimeout(renderJoke, 240);
}

function nextJoke(){ flipTo((currentIndex + 1) % order.length); }
function prevJoke(){ flipTo((currentIndex - 1 + order.length) % order.length); }
function shuffleJoke(){
  for(let i = order.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  flipTo(0);
}
function toggleFav(){
  const idx = order[currentIndex];
  if(favorites.has(idx)) favorites.delete(idx);
  else favorites.add(idx);
  updateFavBtn();
  updateFavCount();
}
function updateFavBtn(){
  const idx = order[currentIndex];
  const btn = document.getElementById('fav-btn');
  if(favorites.has(idx)){
    btn.textContent = '★';
    btn.classList.add('active');
  } else {
    btn.textContent = '☆';
    btn.classList.remove('active');
  }
}
function updateFavCount(){
  document.getElementById('fav-count').textContent = favorites.size + bilmeceFavorites.size;
}

/* ============ BİLMECE VIEWER (espri viewer ile aynı yapı) ============ */
let bilmeceIndex = 0;
let bilmeceOrder = bilmeceler.map((_, i) => i);
let bilmeceFavorites = new Set();
let bilmeceAnswerShown = false;

function openBilmeceler(){ openView('view-bilmece'); renderBilmece(); }

function renderBilmece(){
  const idx = bilmeceOrder[bilmeceIndex];
  const b = bilmeceler[idx];
  document.getElementById('bilmece-text').textContent = b.q;
  document.getElementById('bilmece-counter').textContent = (bilmeceIndex + 1) + ' / ' + bilmeceOrder.length;

  bilmeceAnswerShown = false;
  const ans = document.getElementById('bilmece-answer');
  const revealBtn = document.getElementById('bilmece-reveal-btn');
  ans.style.display = 'none';
  ans.innerHTML = `<span class="label">💡 CEVAP</span>${b.a}`;
  revealBtn.textContent = 'Cevabı Göster';

  updateBilmeceFavBtn();
}

function toggleBilmeceAnswer(){
  bilmeceAnswerShown = !bilmeceAnswerShown;
  const ans = document.getElementById('bilmece-answer');
  const revealBtn = document.getElementById('bilmece-reveal-btn');
  ans.style.display = bilmeceAnswerShown ? 'block' : 'none';
  revealBtn.textContent = bilmeceAnswerShown ? 'Cevabı Gizle' : 'Cevabı Göster';
}

function flipBilmeceTo(newIndex){
  const card = document.getElementById('bilmece-card');
  card.classList.remove('flip');
  void card.offsetWidth;
  card.classList.add('flip');
  bilmeceIndex = newIndex;
  setTimeout(renderBilmece, 240);
}

function nextBilmece(){ flipBilmeceTo((bilmeceIndex + 1) % bilmeceOrder.length); }
function prevBilmece(){ flipBilmeceTo((bilmeceIndex - 1 + bilmeceOrder.length) % bilmeceOrder.length); }
function shuffleBilmece(){
  for(let i = bilmeceOrder.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [bilmeceOrder[i], bilmeceOrder[j]] = [bilmeceOrder[j], bilmeceOrder[i]];
  }
  flipBilmeceTo(0);
}
function toggleBilmeceFav(){
  const idx = bilmeceOrder[bilmeceIndex];
  if(bilmeceFavorites.has(idx)) bilmeceFavorites.delete(idx);
  else bilmeceFavorites.add(idx);
  updateBilmeceFavBtn();
  updateFavCount();
}
function updateBilmeceFavBtn(){
  const idx = bilmeceOrder[bilmeceIndex];
  const btn = document.getElementById('bilmece-fav-btn');
  if(bilmeceFavorites.has(idx)){
    btn.textContent = '★';
    btn.classList.add('active');
  } else {
    btn.textContent = '☆';
    btn.classList.remove('active');
  }
}
function downloadBilmeceCard(){
  const idx = bilmeceOrder[bilmeceIndex];
  const b = bilmeceler[idx];
  downloadBilmece(b, idx + 1);
}

/* ============ TÜMÜ (2'li ızgara) ============ */
function openAllEspriler(){
  openView('view-all-espriler');
  renderAllEspriler();
}
function renderAllEspriler(){
  const grid = document.getElementById('all-espriler-grid');
  grid.innerHTML = '';
  jokes.forEach((j, idx) => {
    const div = document.createElement('div');
    div.className = 'mini-card';
    const isFav = favorites.has(idx);
    div.innerHTML = `
      <span class="mini-num">#${idx + 1}</span>
      ${isFav ? '<span class="mini-star">★</span>' : ''}
      <p class="mini-text">${j.t}</p>
    `;
    div.onclick = () => {
      const pos = order.indexOf(idx);
      currentIndex = pos >= 0 ? pos : 0;
      openView('view-espriler');
      renderJoke();
    };
    grid.appendChild(div);
  });
}

function openAllBilmeceler(){
  openView('view-all-bilmece');
  renderAllBilmeceler();
}
function renderAllBilmeceler(){
  const grid = document.getElementById('all-bilmece-grid');
  grid.innerHTML = '';
  bilmeceler.forEach((b, idx) => {
    const div = document.createElement('div');
    div.className = 'mini-card bilmece-mini';
    const isFav = bilmeceFavorites.has(idx);
    div.innerHTML = `
      <span class="mini-num">#${idx + 1}</span>
      ${isFav ? '<span class="mini-star">★</span>' : ''}
      <p class="mini-text">${b.q}</p>
    `;
    div.onclick = () => {
      const pos = bilmeceOrder.indexOf(idx);
      bilmeceIndex = pos >= 0 ? pos : 0;
      openView('view-bilmece');
      renderBilmece();
    };
    grid.appendChild(div);
  });
}

/* ============ FAVORİLER ============ */
function renderFavoriler(){
  const list = document.getElementById('favoriler-list');
  list.innerHTML = '';
  if(favorites.size === 0 && bilmeceFavorites.size === 0){
    list.innerHTML = `
      <div class="empty-state">
        <span class="emoji">☆</span>
        <p>Henüz favorin yok</p>
        <span class="hint">Espriler veya bilmeceler bölümünde yıldıza dokunarak ekleyebilirsin</span>
      </div>
    `;
    return;
  }
  Array.from(favorites).forEach(idx => {
    const div = document.createElement('div');
    div.className = 'list-item fav-item';
    div.innerHTML = `
      <p class="q">${jokes[idx].t}</p>
      <div class="meta">
        <span>⭐ Favorilerinde</span>
        <button class="remove-fav">Kaldır</button>
      </div>
    `;
    div.querySelector('.remove-fav').onclick = () => {
      favorites.delete(idx);
      updateFavCount();
      renderFavoriler();
    };
    list.appendChild(div);
  });
  Array.from(bilmeceFavorites).forEach(idx => {
    const b = bilmeceler[idx];
    const div = document.createElement('div');
    div.className = 'list-item fav-item';
    div.innerHTML = `
      <p class="q">🧩 ${b.q}</p>
      <p class="a" style="display:block;">💡 ${b.a}</p>
      <div class="meta">
        <span>⭐ Favorilerinde</span>
        <button class="remove-fav">Kaldır</button>
      </div>
    `;
    div.querySelector('.remove-fav').onclick = () => {
      bilmeceFavorites.delete(idx);
      updateFavCount();
      renderFavoriler();
    };
    list.appendChild(div);
  });
}

/* ============ PNG ÜRETİMİ ============ */
function slugify(s){
  return (s||'gulmece').toString().toLowerCase()
    .replace(/ç/g,'c').replace(/ğ/g,'g').replace(/ı/g,'i').replace(/ö/g,'o').replace(/ş/g,'s').replace(/ü/g,'u')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40) || 'gulmece';
}

function wrapText(ctx, text, maxWidth){
  const words = text.split(/\s+/);
  const lines = [];
  let line = '';
  for(const w of words){
    const test = line ? line + ' ' + w : w;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if(line) lines.push(line);
  return lines;
}

function renderCardPNG({badge, mainText, subText, footer, filename}){
  const W = 1080, H = 1350;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // Arka plan: krem-şeftali gradient
  const bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0, '#FFFBF3');
  bg.addColorStop(1, '#FFEAD3');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Mavi ışıltı
  const glow = ctx.createRadialGradient(W/2, 340, 20, W/2, 340, 700);
  glow.addColorStop(0, 'rgba(127,224,238,0.40)');
  glow.addColorStop(1, 'rgba(127,224,238,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0,0,W,H);

  // İkinci ışıltı — alt köşe, sıcak sarı
  const glow2 = ctx.createRadialGradient(W*0.15, H*0.92, 10, W*0.15, H*0.92, 420);
  glow2.addColorStop(0, 'rgba(255,201,74,0.45)');
  glow2.addColorStop(1, 'rgba(255,201,74,0)');
  ctx.fillStyle = glow2;
  ctx.fillRect(0,0,W,H);

  // Nokta doku
  ctx.fillStyle = 'rgba(61,61,61,0.05)';
  for(let y=0;y<H;y+=14){
    for(let x=0;x<W;x+=14){
      ctx.beginPath(); ctx.arc(x,y,1.2,0,Math.PI*2); ctx.fill();
    }
  }

  // Dış çerçevede dağınık kar taneleri / yıldızlar (arka plan üstünde, kartın dışında)
  const scatter = [
    {x:64, y:110, s:22, c:'rgba(92,179,189,0.45)', ch:'❆'},
    {x:W-70, y:150, s:18, c:'rgba(224,185,92,0.5)', ch:'✦'},
    {x:56, y:H-260, s:20, c:'rgba(224,185,92,0.4)', ch:'❆'},
    {x:W-56, y:H-300, s:16, c:'rgba(92,179,189,0.4)', ch:'✦'},
    {x:W-110, y:H-160, s:24, c:'rgba(224,185,92,0.35)', ch:'❄'},
    {x:120, y:H-140, s:16, c:'rgba(92,179,189,0.35)', ch:'✦'},
  ];
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  scatter.forEach(f => {
    ctx.fillStyle = f.c;
    ctx.font = `700 ${f.s}px "Nunito", sans-serif`;
    ctx.fillText(f.ch, f.x, f.y);
  });

  // Slogan — kartın üstünde, tüm sayfanın üst kısmında
  ctx.fillStyle = '#a9895a';
  ctx.font = '800 60px "Nunito", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const sloganLines = wrapText(ctx, 'Her gün yeni bir bilmece, yeni bir gülümseme.', W - 140);
  const sloganLineH = 68;
  const sloganTopMargin = 60;
  let sloganY = sloganTopMargin + sloganLineH / 2;
  for(const ln of sloganLines){
    ctx.fillText(ln, W/2, sloganY);
    sloganY += sloganLineH;
  }
  const sloganBottom = sloganTopMargin + sloganLines.length * sloganLineH;

  // İç kart
  const cx = 90, cy = sloganBottom + 60, cw = W - 180, ch = H - cy - 190;
  const r = 40;
  ctx.fillStyle = '#FFFFFF';
  roundRect(ctx, cx, cy, cw, ch, r);
  ctx.fill();
  // Mavi üst şerit
  ctx.fillStyle = '#7FE0EE';
  roundRect(ctx, cx, cy, cw, 14, {tl:r, tr:r, bl:0, br:0});
  ctx.fill();

  // İnce iç çerçeve — kart kenarına zarif bir hat
  ctx.strokeStyle = 'rgba(224,185,92,0.28)';
  ctx.lineWidth = 2;
  roundRect(ctx, cx + 16, cy + 26, cw - 32, ch - 42, r - 12);
  ctx.stroke();

  // Kart içi hafif kar tanesi dokusu (çok soluk, arka plan hissi)
  const innerFlakes = ['❆','✦','·','❄'];
  const innerPositions = [
    [cx+cw*0.14, cy+ch*0.18],[cx+cw*0.86, cy+ch*0.16],
    [cx+cw*0.10, cy+ch*0.5],[cx+cw*0.90, cy+ch*0.52],
    [cx+cw*0.16, cy+ch*0.78],[cx+cw*0.84, cy+ch*0.8],
    [cx+cw*0.5, cy+ch*0.9],
  ];
  innerPositions.forEach((p,i) => {
    ctx.fillStyle = 'rgba(139,211,221,0.16)';
    ctx.font = `700 ${20 + (i%3)*6}px "Nunito", sans-serif`;
    ctx.save();
    ctx.translate(p[0], p[1]);
    ctx.rotate(((i%2===0?-1:1) * 12) * Math.PI/180);
    ctx.fillText(innerFlakes[i % innerFlakes.length], 0, 0);
    ctx.restore();
  });

  // Köşe süsleri (yıldız + kar tanesi) — uygulama kartıyla aynı dil
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#FFC94A';
  ctx.font = '700 34px "Nunito", sans-serif';
  ctx.save();
  ctx.translate(cx + 56, cy + 96); ctx.rotate(-15 * Math.PI/180);
  ctx.fillText('✦', 0, 0);
  ctx.restore();
  ctx.save();
  ctx.translate(cx + cw - 56, cy + 96); ctx.rotate(15 * Math.PI/180);
  ctx.fillText('✦', 0, 0);
  ctx.restore();
  ctx.fillStyle = 'rgba(224,185,92,0.55)';
  ctx.font = '700 30px "Nunito", sans-serif';
  ctx.save();
  ctx.translate(cx + 56, cy + ch - 130); ctx.rotate(-15 * Math.PI/180);
  ctx.fillText('❆', 0, 0);
  ctx.restore();
  ctx.save();
  ctx.translate(cx + cw - 56, cy + ch - 130); ctx.rotate(15 * Math.PI/180);
  ctx.fillText('❆', 0, 0);
  ctx.restore();

  // Rozet
  ctx.fillStyle = '#2FB6CC';
  const badgeW = 340, badgeH = 70;
  roundRect(ctx, W/2 - badgeW/2, cy - 35, badgeW, badgeH, 35);
  ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.font = '800 30px "Nunito", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(badge, W/2, cy);

  // Süs — açık tırnak
  ctx.fillStyle = '#FFC94A';
  ctx.font = '800 140px "Nunito", serif';
  ctx.textBaseline = 'top';
  ctx.fillText('“', W/2, cy + 130);

  // Gövde metin (ana metin — espri / bilmece sorusu) — dikey ortalanmış
  ctx.fillStyle = '#243B53';
  ctx.font = '800 46px "Nunito", sans-serif';
  ctx.textAlign = 'center';
  const maxW = cw - 130;
  const mainLines = wrapText(ctx, mainText, maxW);
  const lineH = 64;
  const subLinesPreview = subText ? wrapText(ctx, subText, maxW) : [];
  const blockH = mainLines.length * lineH + (subText ? (34 + 50 + subLinesPreview.length * 52) : 200);
  const contentTop = cy + 300;
  const contentBottom = cy + ch - 130;
  const availableH = contentBottom - contentTop;
  let bodyY = contentTop + Math.max(0, (availableH - blockH) / 2);
  ctx.textBaseline = 'top';

  for(const ln of mainLines){
    ctx.fillText(ln, W/2, bodyY);
    bodyY += lineH;
  }

  // İkincil metin (bilmece cevabı) — aynı kart diliyle, ayrı vurgu
  if(subText){
    bodyY += 34;
    ctx.fillStyle = '#F0A500';
    ctx.font = '800 28px "Nunito", sans-serif';
    ctx.fillText('💡 CEVAP', W/2, bodyY);
    bodyY += 50;
    ctx.fillStyle = '#1D8FA3';
    ctx.font = '700 38px "Nunito", sans-serif';
    const subLines = wrapText(ctx, subText, maxW);
    for(const ln of subLines){
      ctx.fillText(ln, W/2, bodyY);
      bodyY += 52;
    }
  } else {
    // Espri kartlarında boş kalan alt alanı canlandırmak için üsttekiyle eşleşen büyük kapanış tırnağı
    ctx.fillStyle = '#FFC94A';
    ctx.font = '800 140px "Nunito", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('”', W/2, bodyY + 30);
    bodyY += 170;

    // Kapanış tırnağının altına küçük bir süsleme ayracı
    ctx.strokeStyle = 'rgba(92,179,189,0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(W/2 - 46, bodyY);
    ctx.lineTo(W/2 + 46, bodyY);
    ctx.stroke();
    ctx.fillStyle = '#7FE0EE';
    ctx.font = '700 22px "Nunito", sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText('❆', W/2, bodyY);
  }

  // Alt kesikli süs
  ctx.strokeStyle = '#FFC94A';
  ctx.lineWidth = 3;
  ctx.setLineDash([10,10]);
  ctx.beginPath();
  ctx.moveTo(cx + 60, cy + ch - 90);
  ctx.lineTo(cx + cw - 60, cy + ch - 90);
  ctx.stroke();
  ctx.setLineDash([]);

  // Alt yazı (kar tanesi ikon satırı — espri kartıyla birebir aynı)
  ctx.fillStyle = '#1D8FA3';
  ctx.font = '700 30px "Nunito", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(footer || '❄  ❄  ❄', W/2, cy + ch - 50);

  // Marka: alt bant (yıldız olmadan) — büyük ve belirgin
  ctx.save();
  ctx.shadowColor = 'rgba(224,185,92,0.45)';
  ctx.shadowBlur = 18;
  ctx.fillStyle = '#F0A500';
  ctx.font = '900 52px "Nunito", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('MuGöl GÜLMECE', W/2, H - 100);
  ctx.restore();

  // Marka altında ince süsleme çizgisi
  ctx.strokeStyle = 'rgba(224,185,92,0.55)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(W/2 - 130, H - 52);
  ctx.lineTo(W/2 + 130, H - 52);
  ctx.stroke();

  // İndir
  c.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  }, 'image/png');
}

function roundRect(ctx, x, y, w, h, r){
  const rr = (typeof r === 'number') ? {tl:r,tr:r,bl:r,br:r} : r;
  ctx.beginPath();
  ctx.moveTo(x+rr.tl, y);
  ctx.lineTo(x+w-rr.tr, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+rr.tr);
  ctx.lineTo(x+w, y+h-rr.br);
  ctx.quadraticCurveTo(x+w, y+h, x+w-rr.br, y+h);
  ctx.lineTo(x+rr.bl, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-rr.bl);
  ctx.lineTo(x, y+rr.tl);
  ctx.quadraticCurveTo(x, y, x+rr.tl, y);
  ctx.closePath();
}

function downloadJoke(){
  const idx = order[currentIndex];
  const j = jokes[idx];
  renderCardPNG({
    badge: 'SOĞUK ESPRİ',
    mainText: j.t,
    subText: '',

  });
}

  renderCardPNG({
    badge: `BİLMECE #${n}`,
    mainText: b.q,
    subText: b.a,
    footer: '❄  ❄  ❄',
    filename: `mugol-bilmece-${n}-${slugify(b.q)}.png`
  });
}

/* ============ SNOWFALL ============ */
function initSnow(){
  const flakes = ['❆','✦','·'];
  const colors = ['rgba(249,226,156,0.35)','rgba(92,179,189,0.25)','rgba(224,185,92,0.30)'];
  for(let i = 0; i < 12; i++){
    const el = document.createElement('div');
    el.textContent = flakes[Math.floor(Math.random()*flakes.length)];
    el.style.position = 'fixed';
    el.style.top = '-10px';
    el.style.left = Math.random()*100 + 'vw';
    el.style.fontSize = (8 + Math.random()*12) + 'px';
    el.style.color = colors[Math.floor(Math.random()*colors.length)];
    el.style.pointerEvents = 'none';
    el.style.zIndex = '0';
    el.style.animation = `fall ${8 + Math.random()*10}s linear infinite`;
    el.style.animationDelay = (Math.random()*10) + 's';
    el.style.setProperty('--drift', (Math.random()*50 - 25) + 'px');
    document.body.appendChild(el);
  }
  const style = document.createElement('style');
  style.textContent = `@keyframes fall{to{transform:translateY(110vh) translateX(var(--drift,20px)) rotate(180deg);}}`;
  document.head.appendChild(style);
}

/* ============ PWA: YÜKLEME BUTONU ============ */
let deferredInstallPrompt = null;
const installBtn = document.getElementById('install-card');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(isStandalone) return;
  deferredInstallPrompt = e;
  if(installBtn) installBtn.style.display = 'flex';
});

function installPWA(){
  if(!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.finally(() => {
    deferredInstallPrompt = null;
    if(installBtn) installBtn.style.display = 'none';
  });
}

window.addEventListener('appinstalled', () => {
  if(installBtn) installBtn.style.display = 'none';
  deferredInstallPrompt = null;
});

/* ============ PWA: SERVICE WORKER KAYDI ============ */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

/* ============ INIT ============ */
renderJoke();
renderBilmece();
initSnow();
</script>
